<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>kari · Продажи Kids</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c18; --bg2:#0d1224;
  --surface:rgba(17,26,48,0.72);
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --t1:#f0f4ff; --t2:#8896b8; --t3:#4a5578;
  --cyan:#00d4ff;  --cyan-d:rgba(0,212,255,0.1);
  --amber:#ffb020; --amber-d:rgba(255,176,32,0.1);
  --red:#ff4757;   --red-d:rgba(255,71,87,0.1);
  --green:#00e676; --green-d:rgba(0,230,118,0.1);
  --violet:#a78bfa;--violet-d:rgba(167,139,250,0.1);
  --kari:#e53935;
  --r:14px; --rs:9px;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Instrument Sans',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}

/* grain */
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px}

/* ambient orbs */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
.o1{width:560px;height:560px;top:-12%;left:-6%;background:radial-gradient(circle,rgba(229,57,53,.07),transparent 70%);animation:of 22s ease-in-out infinite}
.o2{width:420px;height:420px;bottom:-8%;right:-6%;background:radial-gradient(circle,rgba(0,212,255,.05),transparent 70%);animation:of 27s ease-in-out infinite reverse}
.o3{width:320px;height:320px;top:48%;left:58%;background:radial-gradient(circle,rgba(139,92,246,.04),transparent 70%);animation:of 18s ease-in-out infinite 5s}
@keyframes of{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(22px,-32px) scale(1.07)}66%{transform:translate(-16px,24px) scale(.93)}}

.app{position:relative;z-index:1;max-width:1480px;margin:0 auto;padding:0 24px 56px}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 0 20px;border-bottom:1px solid var(--border);margin-bottom:16px;animation:sd .5s ease both}
.hdr-l{display:flex;align-items:center;gap:18px}
.logo{line-height:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-decoration:none}
.logo-top{display:flex;align-items:center;gap:2px;font-size:.55rem;font-weight:800;letter-spacing:2px}
.logo-top .lk{color:#e53935}.logo-top .ld{color:#e57c00}.logo-top .ls{color:#1976d2}
.logo-top .li{color:#43a047}
.logo-top .ldot{color:var(--t3);font-size:.4rem;margin:0 1px;vertical-align:middle}
.logo-word{font-size:2rem;font-weight:900;color:#1a237e;letter-spacing:-2px;line-height:1}
.hdrsep{width:1px;height:32px;background:var(--border2)}
.hdr-info h1{font-size:1.35rem;font-weight:700;letter-spacing:-.4px}
.hdr-info p{font-size:.92rem;color:var(--t3);margin-top:3px}
.hdr-r{display:flex;align-items:center;gap:13px}
.upd-info{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.upd-lbl{font-size:.63rem;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;font-weight:500}
.upd-val{font-family:'IBM Plex Mono',monospace;font-size:.82rem;font-weight:600;color:var(--t2)}
.btn-up{display:flex;align-items:center;gap:6px;padding:7px 15px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);color:var(--t2);font-family:'Instrument Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .18s}
.btn-up:hover{border-color:rgba(0,212,255,.3);color:var(--cyan);background:var(--cyan-d)}
.btn-up:disabled{opacity:.35;cursor:not-allowed}
.spin{display:none;width:11px;height:11px;border:2px solid var(--border2);border-top-color:var(--cyan);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#err{font-size:.74rem;color:var(--red);display:none}

/* ── ALERT ── */
.alert{display:flex;align-items:center;gap:10px;padding:11px 18px;margin-bottom:16px;border-radius:var(--rs);font-size:.8rem;line-height:1.5;animation:sd .5s ease .05s both}
.alert svg{flex-shrink:0}
.alert b{font-weight:700}
.alert.warn{background:linear-gradient(90deg,rgba(255,176,32,.08),rgba(255,176,32,.02));border:1px solid rgba(255,176,32,.15);color:var(--amber)}
.alert.bad{background:linear-gradient(90deg,rgba(255,71,87,.08),rgba(255,71,87,.02));border:1px solid rgba(255,71,87,.15);color:var(--red)}
.alert.ok{background:linear-gradient(90deg,rgba(0,230,118,.08),rgba(0,230,118,.02));border:1px solid rgba(0,230,118,.15);color:var(--green)}

/* ── GLASS CARD ── */
.gc{background:var(--surface);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r);position:relative;overflow:hidden;transition:transform .22s ease,border-color .28s,box-shadow .28s}
.gc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.35)}
.gc::after{content:'';position:absolute;inset:-1px;border-radius:var(--r);background:conic-gradient(from 180deg,transparent,var(--cyan),transparent,var(--violet),transparent);opacity:0;transition:opacity .4s;z-index:-1}
.gc:hover::after{opacity:.1}
/* coloured top stripe (v1 idea) */
.gc.stripe-cy::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),transparent)}
.gc.stripe-am::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),transparent)}
.gc.stripe-gn::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent)}
.gc.stripe-rd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent)}
.gc.stripe-vl::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),transparent)}

/* ── KPI GRID ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.kpi-card{padding:18px 20px;animation:rise .5s ease both}
.kpi-card:nth-child(1){animation-delay:.07s}.kpi-card:nth-child(2){animation-delay:.12s}
.kpi-card:nth-child(3){animation-delay:.17s}.kpi-card:nth-child(4){animation-delay:.22s}
.kpi-card:nth-child(5){animation-delay:.27s}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi-lbl{font-size:.76rem;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);font-weight:600}
.kpi-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;font-family:'IBM Plex Mono',monospace}
.kpi-ico.cy{background:var(--cyan-d);color:var(--cyan)}.kpi-ico.am{background:var(--amber-d);color:var(--amber)}
.kpi-ico.gn{background:var(--green-d);color:var(--green)}.kpi-ico.rd{background:var(--red-d);color:var(--red)}
.kpi-ico.vl{background:var(--violet-d);color:var(--violet)}
.kpi-val{font-family:'IBM Plex Mono',monospace;font-size:1.85rem;font-weight:700;letter-spacing:-.5px;line-height:1;margin-bottom:8px}
.kpi-val.cy{color:var(--cyan)}.kpi-val.am{color:var(--amber)}.kpi-val.gn{color:var(--green)}.kpi-val.rd{color:var(--red)}.kpi-val.vl{color:var(--violet)}
.kpi-bot{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.trend{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:5px;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.trend.up{color:var(--green);background:var(--green-d)}.trend.dn{color:var(--red);background:var(--red-d)}.trend.nt{color:var(--cyan);background:var(--cyan-d)}
.kpi-sub{font-size:.67rem;color:var(--t3)}
.spark-w{height:26px;margin-top:8px}
.spark-w canvas{width:100%!important;height:100%!important}

/* ── RING CARDS ── */
.rings-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.ring-card{padding:22px 20px;text-align:center;animation:rise .5s ease both}
.ring-card:nth-child(1){animation-delay:.3s}.ring-card:nth-child(2){animation-delay:.35s}.ring-card:nth-child(3){animation-delay:.4s}
.ring-name{font-size:.76rem;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);font-weight:600;margin-bottom:12px}
.ring-wrap{position:relative;width:108px;height:108px;margin:0 auto 11px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:7}
.ring-fg{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1)}
.ring-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:1.2rem}
.ring-pct small{font-size:.65rem;color:var(--t3);font-weight:500;margin-top:2px}
.ring-amt{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:700}
.ring-plan{font-size:.78rem;color:var(--t3);margin-top:4px}

/* ── PANEL ── */
.panel{padding:20px;animation:rise .5s ease both}
.pnl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.pnl-title{font-size:.88rem;font-weight:600;letter-spacing:-.2px;color:var(--t1)}
.badge{font-size:.68rem;font-family:'IBM Plex Mono',monospace;font-weight:500;padding:4px 10px;border-radius:6px;white-space:nowrap}
.badge.cy{color:var(--cyan);background:var(--cyan-d)}.badge.rd{color:var(--red);background:var(--red-d)}
.badge.gn{color:var(--green);background:var(--green-d)}.badge.am{color:var(--amber);background:var(--amber-d)}

/* chart wrapper */
.cw{position:relative;width:100%}

/* ── SLIDER ── */
.sld-row{display:flex;align-items:center;gap:11px;margin-bottom:10px;padding:8px 12px;background:rgba(0,0,0,.25);border-radius:var(--rs);border:1px solid var(--border)}
.sld-row span{font-size:.74rem;color:var(--t3);white-space:nowrap;font-weight:600}
.sld-row input[type=range]{flex:1;accent-color:var(--cyan);cursor:pointer;height:3px}
.slv{font-size:.72rem;font-family:'IBM Plex Mono',monospace;color:var(--cyan);font-weight:600;white-space:nowrap;min-width:140px;text-align:right}
.chk-label{display:flex;align-items:center;gap:6px;font-size:.74rem;color:var(--t2);cursor:pointer;margin-bottom:10px}
.chk-label input{accent-color:var(--cyan);width:13px;height:13px;cursor:pointer}

/* legend */
.leg{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--t2);font-weight:500}
.leg-ln{width:18px;height:2px;border-radius:1px;flex-shrink:0}

/* ── YOY BARS ── */
.yoy-rows{display:flex;flex-direction:column;gap:9px}
.yoy-row{display:grid;grid-template-columns:80px 1fr 60px;align-items:center;gap:9px;padding:2px 0}
.yoy-name{font-size:.73rem;color:var(--t2);font-weight:500}
.yoy-track{height:7px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;position:relative}
.yoy-fill{height:100%;border-radius:4px;transition:width 1.1s cubic-bezier(.4,0,.2,1);position:absolute}
.yoy-pct{font-family:'IBM Plex Mono',monospace;font-size:.75rem;font-weight:600;text-align:right}
.yoy-abs{font-size:.63rem;color:var(--t3);padding:0 0 4px 89px}
.yoy-note{font-size:.63rem;color:var(--t3);padding:6px 10px;background:rgba(255,255,255,.02);border-radius:6px;border:1px solid var(--border);margin-top:10px;line-height:1.6}
.yoy-note b{color:var(--t2);font-weight:600}

/* ── PLAN BARS ── */
.plan-leg{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.pl-i{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--t3)}
.pl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── WEEKLY TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead th{text-align:left;padding:9px 11px;font-size:.63rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border2);white-space:nowrap}
thead th:not(:first-child){text-align:right}
tbody td{padding:10px 11px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:.76rem;font-weight:500;color:var(--t2)}
tbody td:not(:first-child){text-align:right}
tbody td:first-child{font-family:'Instrument Sans',sans-serif;font-weight:600;color:var(--t1);font-size:.8rem}
tbody tr{transition:background .15s}
tbody tr:hover{background:rgba(0,212,255,.025)}
tbody tr:last-child td{border-bottom:none}
tbody tr.current-wk td:first-child{color:var(--cyan)}
.c-gn{color:var(--green)!important}.c-am{color:var(--amber)!important}.c-rd{color:var(--red)!important}.c-cy{color:var(--cyan)!important}.c-dm{color:var(--t3)!important}
.prog{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.prog-track{width:52px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width 1.2s ease}

/* ── LAYOUTS ── */
.row{display:grid;gap:12px;margin-bottom:12px}
.r1{grid-template-columns:1fr}
.r21{grid-template-columns:2fr 1fr}
.r12{grid-template-columns:1fr 1.6fr}
.r2{grid-template-columns:1fr 1fr}

/* ── FOOTER ── */
.ftr{text-align:center;padding:24px 0;border-top:1px solid var(--border);margin-top:4px}
.ftr p{font-size:.7rem;color:var(--t3);letter-spacing:.3px;line-height:1.8}
.ftr strong{color:var(--t2);font-weight:600}

/* ── ANIMATIONS ── */
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes sd{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0}to{opacity:1}}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr)}.rings-row{grid-template-columns:1fr 1fr}.r21,.r12,.r2{grid-template-columns:1fr}}
@media(max-width:680px){.kpi-row{grid-template-columns:1fr 1fr}html{font-size:14px}.app{padding:0 14px 40px}.hdr{flex-direction:column;align-items:flex-start;gap:10px}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<input type="file" id="fi" accept=".xlsx" style="display:none">

<div class="app">

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-l">
    <div class="logo">
      <div class="logo-top"><span class="lk">K</span><span class="ldot">●</span><span class="li">I</span><span class="ldot">●</span><span class="ld">D</span><span class="ldot">●</span><span class="ls">S</span></div>
      <div class="logo-word">kari</div>
    </div>
    <div class="hdrsep"></div>
    <div class="hdr-info">
      <h1>Продажи по дням · Kids</h1>
    </div>
  </div>
  <div class="hdr-r">
    <span id="err"></span>
    <div class="upd-info"><span class="upd-lbl">Последние данные</span><span class="upd-val" id="updVal">—</span></div>
    <button class="btn-up" id="btnUp" onclick="document.getElementById('fi').click()">
      📂 Обновить Excel <span class="spin" id="sp"></span>
    </button>
  </div>
</header>

<!-- KPI CARDS -->
<div class="kpi-row" id="kpiRow"></div>

<!-- RING CARDS -->
<div class="rings-row" id="ringsRow"></div>

<!-- MAIN CHART + YOY -->
<div class="row r21" style="animation-delay:.45s">
  <div class="gc panel" style="animation-delay:.45s">
    <div class="pnl-hdr">
      <span class="pnl-title">Продажи по дням — сравнение по годам (млн ₽)</span>
      <div class="leg" id="mainLeg"></div>
    </div>
    <div class="sld-row">
      <span>🗓 45 дней:</span>
      <input type="range" id="spos" min="0" max="100" value="100" oninput="onSl()">
      <span class="slv" id="slv">—</span>
    </div>
    <label class="chk-label"><input type="checkbox" id="chkPlan" checked onchange="buildMain()"> Показать план</label>
    <div class="cw" style="height:270px"><canvas id="cMain"></canvas></div>
  </div>
  <div class="gc panel" style="animation-delay:.50s">
    <div class="pnl-hdr">
      <span class="pnl-title">Сравнение г/г · <span id="yoyLbl">—</span></span>
      <span class="badge" id="yoyBadge">—</span>
    </div>
    <div class="yoy-rows" id="yoyRows"></div>
    <div class="yoy-note" id="yoyNote" style="display:none"></div>
  </div>
</div>

<!-- TRAFFIC + CHECK CHARTS -->
<div class="row r2" style="margin-bottom:12px">
  <div class="gc panel" style="animation-delay:.48s">
    <div class="pnl-hdr">
      <span class="pnl-title">Трафик и конверсия</span>
      <span class="badge cy" id="trBadge">—</span>
    </div>
    <div class="cw" style="height:170px"><canvas id="cTraffic"></canvas></div>
  </div>
  <div class="gc panel" style="animation-delay:.50s">
    <div class="pnl-hdr">
      <span class="pnl-title">Средний чек и скидки</span>
      <span class="badge am">Динамика</span>
    </div>
    <div class="cw" style="height:170px"><canvas id="cCheck"></canvas></div>
  </div>
</div>

<!-- PLAN BARS + WEEKLY TABLE -->
<div class="row r12">
  <div class="gc panel" style="animation-delay:.55s">
    <div class="pnl-hdr">
      <span class="pnl-title">Выполнение плана дня — <span id="planMonLbl">—</span></span>
      <span class="badge" id="planFcBadge">—</span>
    </div>
    <div class="cw" style="height:155px"><canvas id="cPlan"></canvas></div>
    <div class="plan-leg">
      <div class="pl-i"><div class="pl-dot" style="background:var(--green)"></div>≥ 100%</div>
      <div class="pl-i"><div class="pl-dot" style="background:var(--amber)"></div>85–99%</div>
      <div class="pl-i"><div class="pl-dot" style="background:var(--red)"></div>&lt; 85%</div>
    </div>
  </div>
  <div class="gc panel" style="animation-delay:.60s">
    <div class="pnl-hdr">
      <span class="pnl-title">Понедельная динамика · 2026</span>
      <span class="badge cy" id="wkBadge">—</span>
    </div>
    <div class="wk-wrap">
      <table class="wk-tbl">
        <thead><tr>
          <th>Неделя</th><th>Продажи</th><th>План</th><th>Вып.%</th><th>Динамика</th>
        </tr></thead>
        <tbody id="wkBody"></tbody>
      </table>
    </div>
  </div>
</div>

</div><!-- /app -->

<script>
// ══════════════════════

// ── COUNT-UP ──
function countUp(el, target, fmt, duration=900){
  const start=Date.now();
  const tick=()=>{
    const p=Math.min((Date.now()-start)/duration,1);
    const ease=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    const v=target*ease;
    el.textContent=fmt(v);
    if(p<1) requestAnimationFrame(tick);
    else el.textContent=fmt(target);
  };
  requestAnimationFrame(tick);
}

     trend:trendHtmlAbs(dCum),sub:`вклад дня: ${fp(LV.ad!=null?LV.ad:(LV.s||0)-(LV.pl||0),2)} М`,spark:null,sparkCol:null},

  ];

      ${c.spark?`<div class="spark-w"><canvas id="sp${i}"></canvas></div>`:''}
    </div>`).join('');

  // count-up
  cards.forEach((c,i)=>{
    const el=document.getElementById('kv'+i);
    if(el&&c.countTarget!=null) countUp(el,c.countTarget,c.countFmt,800);
    if(c.spark){

      new Chart(cv,{type:'line',data:{labels:c.spark.map((_,j)=>j),datasets:[{

      }]},options:{animation:false,responsive:true,maintainAspectRatio:false,
        scales:{x:{display:false},y:{display:false}},
        plugins:{tooltip:{enabled:false},legend:{display:false}}}});
    }
  });
}

// ── MONTH RINGS ──
function buildRings(){
  const R=47, C=+(2*Math.PI*R).toFixed(1);
  function ring(month, label, isCurrent){
    const ms=`2026-${String(month).padStart(2,'0')}`;
    const actDays=allActual.filter(d=>d.startsWith(ms));
    const allDays26=allDates.filter(d=>d.startsWith(ms));
    const sales=actDays.reduce((s,d)=>s+(LK[d].s||0),0);
    const plan=allDays26.reduce((s,d)=>s+(LK[d].pl||0),0);
    const realPct=plan>0?sales/plan*100:0;
    const displayPct=isCurrent?(LV.fp||realPct):realPct;
    const offset=+(C*(1-displayPct/100)).toFixed(1);
    const col=displayPct>=100?'var(--green)':displayPct>=85?'var(--amber)':'var(--red)';
    const gradId=isCurrent?`url(#rg${month})`:col;
    const borderSt=isCurrent?'border-color:rgba(0,212,255,.2)':'';
    return `<div class="gc ring-card" style="${borderSt}">
      <div class="ring-name" style="${isCurrent?'color:var(--cyan)':''}">${label}</div>
      <div class="ring-wrap">
        <svg viewBox="0 0 108 108" width="108" height="108">
          <circle class="ring-bg" cx="54" cy="54" r="${R}"/>
          <circle class="ring-fg" id="rf${month}" cx="54" cy="54" r="${R}"
            stroke="${gradId}" stroke-dasharray="${C}" stroke-dashoffset="${C}" data-target="${offset}"/>
          ${isCurrent?`<defs><linearGradient id="rg${month}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="var(--cyan)"/><stop offset="100%" stop-color="var(--green)"/>
          </linearGradient></defs>`:''}
        </svg>
        <div class="ring-pct" style="color:${isCurrent?'var(--cyan)':col}">
          ${displayPct.toFixed(1)}%<small>${isCurrent?'оценка':'факт'}</small>
        </div>
      </div>
      <div class="ring-amt" style="color:${isCurrent?'var(--cyan)':col}">${sales.toFixed(1)} млн ₽</div>
      <div class="ring-plan">план: ${plan.toFixed(1)} млн ₽</div>
    </div>`;
  }
  document.getElementById('ringsRow').innerHTML=
    ring(1,'Январь 2026',false)+ring(2,'Февраль 2026',false)+ring(3,'Март 2026',true);
  setTimeout(()=>document.querySelectorAll('.ring-fg').forEach(el=>{
    el.style.strokeDashoffset=el.dataset.target;
  }),120);
}

// ── YOY BARS ──
function buildYoY(){
  const curDate=new Date(lastD);
  const curM=curDate.getMonth()+1, curY=curDate.getFullYear(), curDay=curDate.getDate();
  document.getElementById('yoyLbl').textContent=MFU[curM]+' '+curY+' (накоп.)';

  const pad=n=>String(n).padStart(2,'0');
  const monthPrefix=(y,m)=>`${y}-${pad(m)}-`;
  const upto=(y,m,day)=>allDates
    .filter(d=>d.startsWith(monthPrefix(y,m)))
    .filter(d=>+d.slice(8)<=day)
    .sort();

  const curDays=upto(curY,curM,curDay);
  const prevDays=upto(curY-1,curM,curDay);
  const prev2Days=upto(curY-2,curM,curDay);

  function sumBy(days,key){
    return days.reduce((s,d)=>s+(LK[d]?.[key]||0),0);
  }
  function avgBy(days,key){
    const vs=days.map(d=>LK[d]?.[key]).filter(v=>v!=null);
    return vs.length?vs.reduce((s,v)=>s+v,0)/vs.length:null;
  }

  const sCur=sumBy(curDays,'s'),  sPrev=sumBy(prevDays,'s'),  sPrev2=sumBy(prev2Days,'s');
  const tCur=sumBy(curDays,'tr'), tPrev=sumBy(prevDays,'tr');
  const cCur=avgBy(curDays,'cv'), cPrev=avgBy(prevDays,'cv');
  const kCur=avgBy(curDays,'ck'), kPrev=avgBy(prevDays,'ck');
  const dvCur=sumBy(curDays,'dv'), dvPrev=sumBy(prevDays,'dv');

  const dRev=pct(sCur,sPrev);
  const dRev24=pct(sCur,sPrev2);
  const dTr=pct(tCur,tPrev);
  const dCk=pct(kCur,kPrev);
  const dCvRel=pct(cCur,cPrev);
  const dCvAbs=(cCur!=null&&cPrev!=null)?(cCur-cPrev):null;
  const dDv=pct(dvCur,dvPrev);

  const bdg=document.getElementById('yoyBadge');
  if(dRev!=null){
    bdg.textContent=(dRev>=0?'+':'')+dRev.toFixed(1)+'% г/г';
    bdg.className='badge '+(dRev>=0?'gn':'rd');
  }else{
    bdg.textContent='—';
    bdg.className='badge';
  }

  function bar(name,displayVal,unit,absStr,baseCol,widthVal){
    if(displayVal==null)return '';
    const pos=displayVal>=0;
    const w=Math.min(Math.abs(widthVal ?? displayVal)*3,100);
    const fill=pos
      ?`left:0;right:auto;background:linear-gradient(90deg,transparent,${baseCol})`
      :`right:0;left:auto;background:linear-gradient(270deg,transparent,${baseCol})`;
    return `<div class="yoy-row">
      <span class="yoy-name">${name}</span>
      <div class="yoy-track"><div class="yoy-fill" style="width:0%;${fill}" data-w="${w}"></div></div>
      <span class="yoy-pct" style="color:${pos?'var(--green)':'var(--red)'}">${(displayVal>=0?'+':'')+displayVal.toFixed(1)}${unit}</span>
    </div>
    ${absStr?`<div class="yoy-abs">${absStr}</div>`:''}`;
  }

  document.getElementById('yoyRows').innerHTML=
    bar('Продажи',dRev,'%',(sCur&&sPrev)?fp(sCur-sPrev,1)+' млн ₽':null,'var(--cyan)',dRev)+
    bar('vs 2024',dRev24,'%',(sCur&&sPrev2)?fp(sCur-sPrev2,1)+' млн ₽':null,'var(--violet)',dRev24)+
    bar('Трафик',dTr,'%',(tCur&&tPrev)?fp((tCur-tPrev)/1000,0)+'K чел.':null,'var(--amber)',dTr)+
    (dCvRel!=null?bar('Конверсия',dCvRel,'%',dCvAbs!=null?fp(dCvAbs,2)+' п.п.':null,'var(--green)',dCvRel):'')+
    (dDv!=null?bar('Скидка',dDv,'%',(dvCur&&dvPrev)?fp((dvCur-dvPrev)/1e6,1)+' млн ₽':null,'var(--amber)',dDv):'')+
    (dCk!=null?bar('Ср. чек',dCk,'%',(kCur&&kPrev)?fp(kCur-kPrev,0)+' ₽':null,'var(--violet)',dCk):'');

  document.getElementById('yoyNote').innerHTML='';

  setTimeout(()=>document.querySelectorAll('.yoy-fill').forEach(el=>{
    el.style.width=el.dataset.w+'%';
  }),100);
}

// ── FILE UPLOAD ──
document.getElementById('fi').addEventListener('change',async function(e){
  const f=e.target.files?.[0]; if(!f)return;
  const btn=document.getElementById('btnUp'),sp=document.getElementById('sp'),err=document.getElementById('err');
  btn.disabled=true;sp.style.display='inline-block';err.style.display='none';
  try{
    const ab=await f.arrayBuffer();
    const wb=XLSX.read(ab,{type:'array',cellDates:false}); // cellDates:false → работаем с числами сами
    const sh=wb.Sheets['Продажи по дням'];
    if(!sh)throw new Error("Лист 'Продажи по дням' не найден");

    const raw=XLSX.utils.sheet_to_json(sh,{header:1,defval:null});
    const hdr=raw[0]||[];
    const fi=(kw)=>hdr.findIndex(h=>h&&String(h).includes(kw));
    const CI={
      dt:  fi('Дата'),
      s:   fi('Продажи за день'),
      pl:  fi('План на день'),
      pp:  fi('Выполнение плана'),
      ad:  fi('Абс.откл'),
      fpr: fi('Прогноз выполнения'),
      tr:  fi('Трафик за день'),
      cv:  fi('Конверсия'),
      ck:  fi('Средний чек'),
      dk:  fi('Скидка, %'),
      dv:  fi('Объем скидки'),
    };
    console.log('Колонки:', JSON.stringify(CI), '| Строк:', raw.length);

    // Excel serial → YYYY-MM-DD (стандартная формула, UTC, без смещения по timezone)
    const serialToDate=(n)=>{
      if(n==null)return null;
      return new Date(Math.round((n-25569)*86400*1000)).toISOString().slice(0,10);
    };

    // Полностью перестраиваем LK из Excel
    // Сначала чистим все ключи
    Object.keys(LK).forEach(k=>delete LK[k]);

    for(let i=1;i<raw.length;i++){
      const row=raw[i];
      const dv=row[CI.dt]; if(dv==null)continue;
      let ds;
      if(typeof dv==='number') ds=serialToDate(dv);
      else ds=String(dv).slice(0,10);
      if(!/^\d{4}-\d{2}-\d{2}$/.test(ds))continue;

      const en={};
      const v=(c)=>(c>=0&&row[c]!=null)?row[c]:null;
      if(v(CI.s) !=null)en.s  =Math.round(v(CI.s)/1e4)/100;
      if(v(CI.pl)!=null)en.pl =Math.round(v(CI.pl)/1e4)/100;
      if(v(CI.pp)!=null)en.pp =Math.round(v(CI.pp)*10000)/100;
      if(v(CI.tr)!=null)en.tr =Math.round(v(CI.tr));
      if(v(CI.cv)!=null)en.cv =Math.round(v(CI.cv)*1000000)/10000;
      if(v(CI.ck)!=null)en.ck =v(CI.ck);
      if(v(CI.ad)!=null)en.ad =Math.round(v(CI.ad)/1e4)/100;
      if(v(CI.fpr)!=null)en.fpr=Math.round(v(CI.fpr)/1e4)/100;
      if(v(CI.dk)!=null)en.dk =v(CI.dk);
      if(v(CI.dv)!=null)en.dv =v(CI.dv);
      if(Object.keys(en).length) LK[ds]=en;
    }

    // Пересчитываем глобальные переменные
    allActual = Object.keys(LK).filter(d=>LK[d]?.s!=null).sort();
    lastD     = allActual[allActual.length-1];
    prevD     = allActual[allActual.length-2];
    LV        = LK[lastD];
    PV        = LK[prevD]||{};
    allDates  = Object.keys(LK).sort();

    console.log('lastD после загрузки:', lastD, '| LV:', JSON.stringify(LV));

    // Пересчёт fp% — точно как в Python-скрипте
    for(let m=1;m<=12;m++){
      const ms=`2026-${String(m).padStart(2,'0')}`;
      const actDays=allActual.filter(d=>d.startsWith(ms));
      if(!actDays.length)continue;
      const allM=Object.keys(LK).filter(d=>d.startsWith(ms)).sort();
      const totalPlan=allM.reduce((s,d)=>s+(LK[d]?.pl||0),0);
      if(!totalPlan)continue;
      actDays.forEach(d=>{
        const salesSoFar=actDays.filter(x=>x<=d).reduce((s,x)=>s+(LK[x]?.s||0),0);
        const fprSum=allM.filter(x=>x>d).reduce((s,x)=>s+(LK[x]?.fpr||LK[x]?.pl||0),0);
        LK[d].fp=Math.round((salesSoFar+fprSum)/totalPlan*1000)/10;
      });
    }
    LV=LK[lastD]; PV=LK[prevD]||{};

    // Обновляем дату
    const elUpd=document.getElementById('updVal');
    if(elUpd){
      const today=new Date();
      const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const yest=new Date(today); yest.setDate(yest.getDate()-1);
      const yestStr=`${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,'0')}-${String(yest.getDate()).padStart(2,'0')}`;
      if(lastD===todayStr)elUpd.textContent='сегодня';
      else if(lastD===yestStr)elUpd.textContent=fd(lastD)+' (вчера)';
      else elUpd.textContent=fd(lastD);
    }

    buildKPI(); buildRings(); initSlider();
    buildMain(); buildYoY(); buildTraffic(); buildCheck(); buildPlan(); buildWeekly();
    err.textContent='✓ Обновлено: '+f.name+' | Данные по '+fd(lastD);
    err.style.color='var(--green)'; err.style.display='inline';
    setTimeout(()=>{err.style.display='none';},4000);
  }catch(er){
    console.error(er);
    err.textContent='⚠ '+er.message; err.style.display='inline';
  }
  finally{btn.disabled=false;sp.style.display='none';this.value='';}
});

// ── INIT ──
buildKPI(); buildRings(); initSlider(); buildMain(); buildYoY(); buildTraffic(); buildCheck(); buildPlan(); buildWeekly();
</script>
